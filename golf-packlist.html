<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golf Trip Packer</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green-deep: #1a3a2a;
    --green-mid: #2d6a4f;
    --green-bright: #52b788;
    --green-light: #b7e4c7;
    --gold: #c9a84c;
    --cream: #faf7f0;
    --text-dark: #12201a;
    --text-mid: #4a6358;
    --shadow: 0 4px 24px rgba(26,58,42,0.10);
    --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text-dark); min-height: 100vh; }

  /* HERO */
  .hero { background: var(--green-deep); padding: 40px 24px 48px; text-align: center; position: relative; overflow: hidden; }
  .hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 70% 0%, rgba(82,183,136,0.18) 0%, transparent 65%), radial-gradient(ellipse at 20% 100%, rgba(201,168,76,0.12) 0%, transparent 50%); }
  .hero-flag { font-size: 48px; margin-bottom: 10px; position: relative; display: block; animation: bounce 2s ease-in-out infinite; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
  .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(1.8rem,5vw,3rem); font-weight: 900; color: var(--cream); position: relative; }
  .hero h1 span { color: var(--gold); }
  .hero p { color: var(--green-light); font-size: 0.95rem; margin-top: 8px; position: relative; font-weight: 300; }

  .container { max-width: 720px; margin: 0 auto; padding: 28px 20px 60px; }

  /* FORM */
  .form-card { background: white; border-radius: var(--radius); padding: 28px; box-shadow: var(--shadow); margin-bottom: 28px; animation: slideUp 0.4s ease both; }
  @keyframes slideUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  .form-steps { display: flex; flex-direction: column; }
  .step { padding: 20px 0; border-bottom: 1px solid #f0f4f2; }
  .step:last-child { border-bottom: none; padding-bottom: 0; }
  .step:first-child { padding-top: 0; }
  .step-num { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--green-bright); margin-bottom: 4px; }
  .step-label { font-size: 0.78rem; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-mid); margin-bottom: 12px; }

  .field input { padding: 13px 16px; border: 1.5px solid #e2e8e4; border-radius: 10px; font-size: 1rem; font-family: 'DM Sans', sans-serif; color: var(--text-dark); background: #fafcfb; outline: none; transition: border-color 0.2s; width: 100%; }
  .field input:focus { border-color: var(--green-bright); background: white; }

  /* GOLFER TYPE TOGGLE */
  .gt-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .gt-btn { background: #f7faf8; border: 2px solid #e2e8e4; border-radius: 12px; padding: 16px; cursor: pointer; text-align: left; transition: all 0.18s; display: flex; flex-direction: column; gap: 4px; font-family: 'DM Sans', sans-serif; }
  .gt-btn:hover { border-color: var(--green-bright); background: #f0faf5; }
  .gt-btn.active { border-color: var(--green-deep); background: var(--green-deep); }
  .gt-icon { font-size: 1.6rem; display: block; margin-bottom: 4px; }
  .gt-label { font-size: 0.95rem; font-weight: 700; color: var(--text-dark); }
  .gt-sub { font-size: 0.78rem; color: var(--text-mid); }
  .gt-btn.active .gt-label { color: white; }
  .gt-btn.active .gt-sub { color: var(--green-light); }

  /* DATE RANGE */
  .date-range-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .date-field { display: flex; flex-direction: column; gap: 5px; }
  .date-field label { font-size: 0.7rem; font-weight: 600; color: var(--text-mid); letter-spacing: 0.05em; text-transform: uppercase; }
  .date-field input[type="date"] { padding: 11px 14px; border: 1.5px solid #e2e8e4; border-radius: 10px; font-size: 0.95rem; font-family: 'DM Sans', sans-serif; color: var(--text-dark); background: #fafcfb; outline: none; transition: border-color 0.2s; width: 100%; }
  .date-field input[type="date"]:focus { border-color: var(--green-bright); background: white; }

  /* CAL STRIP */
  .cal-strip { margin-top: 12px; overflow-x: auto; scrollbar-width: none; }
  .cal-strip::-webkit-scrollbar { display: none; }
  .cal-days { display: flex; gap: 6px; padding-bottom: 4px; min-width: max-content; }
  .cal-day { width: 48px; padding: 8px 4px; border-radius: 10px; text-align: center; cursor: pointer; border: 1.5px solid #e8eeeb; background: white; transition: all 0.15s; flex-shrink: 0; }
  .cal-day:hover { border-color: var(--green-bright); background: #f0faf5; }
  .cal-day.selected { background: var(--green-deep); border-color: var(--green-deep); color: white; }
  .cal-day.in-range { background: var(--green-light); border-color: var(--green-light); }
  .cal-day.range-start, .cal-day.range-end { background: var(--green-deep); border-color: var(--green-deep); color: white; }
  .cal-day.today-marker { border-color: var(--gold); }
  .cal-day-name { font-size: 0.62rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; opacity: 0.65; margin-bottom: 3px; }
  .cal-day-num { font-size: 1rem; font-weight: 700; line-height: 1; }
  .cal-day-month { font-size: 0.6rem; opacity: 0.6; margin-top: 2px; }
  .cal-day.selected .cal-day-name, .cal-day.range-start .cal-day-name, .cal-day.range-end .cal-day-name { opacity: 0.8; }

  .trip-summary { margin-top: 12px; padding: 10px 14px; background: #f0faf5; border-radius: 8px; font-size: 0.85rem; color: var(--green-mid); font-weight: 500; display: none; }
  .trip-summary.visible { display: block; }

  /* SUBMIT */
  .submit-btn { width: 100%; padding: 15px; background: var(--green-deep); color: white; border: none; border-radius: 12px; font-size: 1rem; font-family: 'DM Sans', sans-serif; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.2s; margin-top: 20px; }
  .submit-btn:hover { background: var(--green-mid); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(26,58,42,0.2); }
  .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .spinner { width: 18px; height: 18px; border: 2.5px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }

  /* SECTION TITLE */
  .section-title { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 700; color: var(--green-deep); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }

  /* DAY CARD */
  .day-card { background: white; border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); margin-bottom: 14px; border-left: 4px solid var(--green-bright); }
  .day-card.rainy { border-left-color: #5a8fa0; }
  .day-card.cold  { border-left-color: #a0b4c8; }
  .day-card.hot   { border-left-color: var(--gold); }
  .day-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; flex-wrap: wrap; gap: 12px; }
  .day-label { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--green-bright); margin-bottom: 4px; }
  .day-date { font-family: 'Playfair Display', serif; font-size: 1.35rem; font-weight: 700; color: var(--text-dark); }
  .day-desc { font-size: 0.85rem; color: var(--text-mid); margin-top: 2px; text-transform: capitalize; }
  .day-temp-block { text-align: right; }
  .day-temp { font-family: 'Playfair Display', serif; font-size: 2.4rem; font-weight: 900; color: var(--green-deep); line-height: 1; }
  .day-range { font-size: 0.78rem; color: var(--text-mid); margin-top: 3px; }
  .day-meta { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 18px; }
  .day-meta-item { font-size: 0.82rem; color: var(--text-mid); }

  /* SLOTS */
  .slots { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 18px; }
  .slot { background: #f7faf8; border-radius: 12px; padding: 13px; }
  .slot-label { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase; color: var(--text-mid); margin-bottom: 2px; }
  .slot-time { font-size: 0.68rem; color: #8aab97; margin-bottom: 6px; }
  .slot-icon { font-size: 1.2rem; margin-bottom: 4px; display: block; }
  .slot-temp { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 700; color: var(--green-deep); }
  .slot-feels { font-size: 0.7rem; color: var(--text-mid); }
  .slot-meta { font-size: 0.7rem; color: var(--text-mid); margin-top: 2px; }

  /* CLOTHING RECOMMENDATION */
  .clothing-rec { background: #f7faf8; border-radius: 12px; padding: 16px; }
  .clothing-rec-title { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--green-mid); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .clothing-items { display: flex; flex-direction: column; gap: 6px; }
  .clothing-item { font-size: 0.88rem; color: var(--text-dark); display: flex; align-items: flex-start; gap: 8px; }
  .clothing-item::before { content: '•'; color: var(--green-bright); font-weight: 700; flex-shrink: 0; margin-top: 1px; }
  .clothing-tip { margin-top: 10px; padding: 8px 12px; background: #fff8e6; border-radius: 8px; font-size: 0.78rem; color: #7a5a00; }

  /* WEEK GRID */
  .week-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; margin-bottom: 28px; }
  .week-card { background: white; border-radius: 12px; padding: 14px; box-shadow: var(--shadow); border-top: 3px solid var(--green-bright); }
  .week-card.rainy { border-top-color: #5a8fa0; }
  .week-card.cold  { border-top-color: #a0b4c8; }
  .week-card.hot   { border-top-color: var(--gold); }
  .wc-day { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-mid); margin-bottom: 4px; }
  .wc-icon { font-size: 1.4rem; display: block; margin-bottom: 4px; }
  .wc-temp { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 700; color: var(--green-deep); }
  .wc-range { font-size: 0.72rem; color: var(--text-mid); margin-bottom: 5px; }
  .wc-rain { font-size: 0.75rem; color: #5a8fa0; }
  .wc-wind { font-size: 0.75rem; color: var(--text-mid); margin-top: 2px; }
  .wc-desc { font-size: 0.72rem; color: var(--text-mid); margin-top: 4px; text-transform: capitalize; }
  .rain-bar { height: 4px; background: #e8f0ed; border-radius: 10px; margin-top: 3px; overflow: hidden; }
  .rain-fill { height: 100%; border-radius: 10px; background: #5a8fa0; }
  .wc-clothes { margin-top: 8px; padding-top: 8px; border-top: 1px solid #f0f4f2; }
  .wc-clothes-item { font-size: 0.72rem; color: var(--text-dark); margin-bottom: 2px; display: flex; gap: 5px; }
  .wc-clothes-item::before { content: '·'; color: var(--green-bright); font-weight: 700; }

  /* PACK LIST */
  .packlist-card { background: white; border-radius: var(--radius); padding: 26px; box-shadow: var(--shadow); margin-bottom: 16px; }
  .pack-category { margin-bottom: 20px; }
  .pack-category:last-child { margin-bottom: 0; }
  .pack-cat-title { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid #f0e8d0; display: flex; align-items: center; justify-content: space-between; }
  .pack-items { display: flex; flex-direction: column; gap: 4px; }
  .pack-item { display: flex; align-items: center; gap: 12px; font-size: 0.92rem; color: var(--text-dark); padding: 8px 10px; border-radius: 8px; cursor: pointer; transition: background 0.15s; user-select: none; }
  .pack-item:hover { background: #f7faf8; }
  .pack-item.ticked { background: #f0faf5; }
  .pack-item.ticked .pack-name { text-decoration: line-through; color: #aac4b4; }
  .pack-item.ticked .pack-qty { opacity: 0.4; }
  .pack-check { width: 22px; height: 22px; border: 2px solid #d0e4d8; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: transparent; font-size: 0.7rem; font-weight: 700; transition: all 0.15s; background: white; }
  .pack-item.ticked .pack-check { background: var(--green-bright); border-color: var(--green-bright); color: white; }
  .pack-qty { margin-left: auto; background: var(--green-light); color: var(--green-deep); font-size: 0.75rem; font-weight: 600; padding: 2px 9px; border-radius: 20px; }
  .pack-progress { font-size: 0.72rem; color: var(--text-mid); font-weight: 400; }
  .pack-tip { margin-top: 16px; padding: 12px 16px; background: #fff8e6; border-radius: 10px; font-size: 0.82rem; color: #7a5a00; line-height: 1.5; }

  .skeleton { background: linear-gradient(90deg,#f0f4f2 25%,#e2ebe6 50%,#f0f4f2 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 8px; height: 14px; margin-bottom: 8px; }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  .alert { background: #fff3cd; border-left: 4px solid var(--gold); padding: 14px 18px; border-radius: 10px; font-size: 0.9rem; color: #7a5a00; margin-bottom: 20px; }
  #result { animation: slideUp 0.4s ease both; }

  @media (max-width: 520px) {
    .slots { grid-template-columns: 1fr; }
    .week-grid { grid-template-columns: repeat(2, 1fr); }
    .date-range-row { grid-template-columns: 1fr; }
    .gt-toggle { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="hero">
  <span class="hero-flag">⛳</span>
  <h1>Golf Trip <span>Packer</span></h1>
  <p>Weather-smart packing for your perfect round</p>
</div>

<div class="container">
  <div class="form-card">
    <div class="form-steps">

      <div class="step">
        <div class="step-num">Step 1</div>
        <div class="step-label">How do you handle the cold?</div>
        <div class="gt-toggle">
          <button class="gt-btn active" id="gt-avg" onclick="setGolferType('average')">
            <span class="gt-icon">🏌️</span>
            <span class="gt-label">Average golfer</span>
            <span class="gt-sub">Normal temperature sensitivity</span>
          </button>
          <button class="gt-btn" id="gt-cold" onclick="setGolferType('cold')">
            <span class="gt-icon">🥶</span>
            <span class="gt-label">Cold-sensitive</span>
            <span class="gt-sub">I always feel the chill</span>
          </button>
        </div>
      </div>

      <div class="step">
        <div class="step-num">Step 2</div>
        <div class="step-label">Where are you playing?</div>
        <div class="field">
          <input id="location" placeholder="e.g. Marbella, Algarve, St Andrews" />
        </div>
      </div>

      <div class="step">
        <div class="step-num">Step 3</div>
        <div class="step-label">One round or a full trip?</div>
        <div class="gt-toggle" style="margin-bottom:16px">
          <button class="gt-btn active" id="mode-trip" onclick="setTripMode('trip')">
            <span class="gt-icon">🧳</span>
            <span class="gt-label">Full trip</span>
            <span class="gt-sub">Pick a date range</span>
          </button>
          <button class="gt-btn" id="mode-oneday" onclick="setTripMode('oneday')">
            <span class="gt-icon">📅</span>
            <span class="gt-label">One round</span>
            <span class="gt-sub">Just one day</span>
          </button>
        </div>
        <div id="date-range-section">
          <div class="date-range-row">
            <div class="date-field">
              <label>From</label>
              <input type="date" id="start-date" />
            </div>
            <div class="date-field">
              <label>To</label>
              <input type="date" id="end-date" />
            </div>
          </div>
        </div>
        <div class="cal-strip">
          <div class="cal-days" id="cal-days"></div>
        </div>
        <div class="trip-summary" id="trip-summary"></div>
      </div>

    </div>
    <button class="submit-btn" id="main-btn" onclick="checkTrip()">
      <span>Check my golf packer</span>
    </button>
  </div>

  <div id="result"></div>
</div>

<script>
// ── GOLFER TYPE ─────────────────────────────────────────────────
let golferType = 'average';
function setGolferType(type) {
  golferType = type;
  document.getElementById('gt-avg').classList.toggle('active', type === 'average');
  document.getElementById('gt-cold').classList.toggle('active', type === 'cold');
}

// ── TRIP MODE ───────────────────────────────────────────────────
let tripMode = 'trip';
function setTripMode(mode) {
  tripMode = mode;
  document.getElementById('mode-trip').classList.toggle('active', mode === 'trip');
  document.getElementById('mode-oneday').classList.toggle('active', mode === 'oneday');
  document.getElementById('date-range-section').style.display = mode === 'trip' ? 'block' : 'none';
  if (mode === 'oneday') {
    // clear end date so calendar works in single-day mode
    document.getElementById('end-date').value = '';
    refreshCal(); updateSummary();
  }
}

// ── CLOTHING LOGIC ──────────────────────────────────────────────
// Returns outfit array based on avg temp, rain, wind and golfer type
function getClothingForTemp(avgTemp, rainChance, windSpeed, type) {
  const cold  = type === 'cold';
  const rainy = rainChance > 40;
  const windy = windSpeed > 20;
  const items = [];
  let tip = null;

  if (avgTemp <= 12) {
    // ~10°C bracket
    if (cold) {
      items.push('Thermal base layer');
      items.push('Golf polo');
      items.push('Warm midlayer (fleece or quarter-zip)');
      items.push(rainy ? 'Waterproof golf jacket' : 'Windproof golf jacket');
      items.push('Golf pants');
      items.push('Optional thermal leggings under pants');
      items.push('Warm socks');
      items.push('Beanie or warm hat');
      if (rainy) items.push('Waterproof gloves');
    } else {
      items.push('Golf polo');
      items.push('Thin midlayer');
      items.push(rainy ? 'Waterproof jacket' : 'Light wind jacket');
      items.push('Golf pants');
      items.push('Cap');
      if (rainy) items.push('Waterproof gloves');
    }
  } else if (avgTemp <= 17) {
    // ~15°C bracket
    if (cold) {
      items.push('Golf polo');
      items.push('Midlayer (quarter-zip or light sweater)');
      items.push(rainy ? 'Waterproof jacket' : 'Wind jacket or vest');
      items.push('Golf pants');
      items.push('Cap');
      if (windy) items.push('Extra glove');
    } else {
      items.push('Golf polo');
      items.push('Optional thin midlayer for the first few holes');
      items.push(rainy ? 'Waterproof jacket' : windy ? 'Light wind jacket' : null);
      items.push('Golf pants or lightweight pants');
      items.push('Cap');
    }
    tip = '💡 Many golfers wear a layer they can remove after a few holes.';
  } else if (avgTemp <= 24) {
    // ~20°C bracket — shorts from 15°C+
    if (cold) {
      items.push('Golf polo');
      items.push('Optional light sweater in the morning');
      items.push('Golf shorts or lightweight pants');
      items.push('Cap');
    } else {
      items.push('Golf polo');
      items.push('Golf shorts');
      items.push('Cap or visor');
      items.push('Sunglasses');
    }
    tip = '☀️ Ideal golf weather for most players.';
  } else {
    // ~30°C+ bracket
    if (cold) {
      items.push('Lightweight breathable polo');
      items.push('Golf shorts');
      items.push('Cap or visor');
      items.push('Sunglasses');
      items.push('Sunscreen');
    } else {
      items.push('Lightweight performance polo');
      items.push('Golf shorts');
      items.push('Cap or visor');
      items.push('Sunglasses');
      items.push('Sunscreen');
    }
    tip = '💡 Many golfers bring an extra polo to change into after 9 holes in hot weather.';
  }

  return { items: items.filter(Boolean), tip };
}

// ── PACK LIST ───────────────────────────────────────────────────
function generatePacklist(days, type) {
  const n        = days.length;
  const cold     = type === 'cold';
  const hotDays  = days.filter(d => d.avgTemp > 15).length;
  const coldDays = days.filter(d => d.avgTemp <= 12).length;
  const mildDays = n - hotDays - coldDays;
  const anyRain  = days.some(d => d.rainChance > 40);
  const anyCold  = coldDays > 0;
  const anyHot   = hotDays > 0;
  const anyWind  = days.some(d => d.windSpeed > 20);

  return {
    clothing: [
      { name: 'Golf polos / shirts',                        qty: n + 1 },
      hotDays > 0 ? { name: 'Golf shorts',                  qty: hotDays } : null,
      (coldDays + mildDays) > 0 ? { name: 'Golf trousers',  qty: coldDays + mildDays } : null,
      (cold || anyCold || mildDays > 0) ? { name: 'Midlayer / quarter-zip', qty: 1 } : null,
      (cold && coldDays > 0) ? { name: 'Thermal base layer', qty: coldDays } : null,
      (cold && coldDays > 0) ? { name: 'Thermal leggings',  qty: 1 } : null,
      anyRain ? { name: 'Waterproof golf jacket',           qty: 1 } : (anyWind ? { name: 'Wind jacket', qty: 1 } : null),
      { name: 'Cap / visor',                                qty: 1 },
      (cold || anyCold) ? { name: 'Beanie / warm hat',      qty: 1 } : null,
      { name: 'Golf socks',                                 qty: n + 1 },
      (cold && coldDays > 0) ? { name: 'Warm socks',        qty: coldDays } : null,
    ].filter(Boolean),
    footwear: [
      { name: 'Golf shoes',                                 qty: 1 },
      { name: 'Casual shoes / trainers',                    qty: 1 },
      anyHot ? { name: 'Flip flops',                        qty: 1 } : null,
    ].filter(Boolean),
    equipment: [
      { name: 'Golf gloves',                                qty: anyRain ? 3 : 2 },
      { name: 'Golf balls',                                 qty: n * 4 },
      { name: 'Tees (mixed)',                               qty: 30 },
      { name: 'Golf towel',                                 qty: 1 },
      { name: 'Divot tool & ball marker',                   qty: 1 },
      { name: 'Rangefinder / GPS watch',                    qty: 1 },
      anyRain ? { name: 'Umbrella',                         qty: 1 } : null,
    ].filter(Boolean),
    essentials: [
      anyHot  ? { name: 'Sunscreen SPF 50',                 qty: 1 } : null,
      anyHot  ? { name: 'Sunglasses',                       qty: 1 } : null,
      { name: 'Lip balm with SPF',                          qty: 1 },
      { name: 'Blister plasters',                           qty: 1 },
      { name: 'Snacks / energy bars',                       qty: n * 2 },
      { name: 'Water bottle',                               qty: 1 },
    ].filter(Boolean),
  };
}

// ── CALENDAR ────────────────────────────────────────────────────
const today = new Date(); today.setHours(0,0,0,0);
const maxDate = new Date(today); maxDate.setDate(today.getDate() + 13);
function dateStr(d) { return d.toISOString().split('T')[0]; }
function parseDate(s) { return new Date(s+'T00:00:00'); }

const startInput = document.getElementById('start-date');
const endInput   = document.getElementById('end-date');
startInput.min = startInput.value = dateStr(today);
startInput.max = endInput.max = dateStr(maxDate);
endInput.min   = dateStr(today);

function buildCalStrip() {
  const container = document.getElementById('cal-days');
  container.innerHTML = '';
  for (let i = 0; i < 14; i++) {
    const d = new Date(today); d.setDate(today.getDate() + i);
    const ds = dateStr(d);
    const el = document.createElement('div');
    el.className = 'cal-day' + (i === 0 ? ' today-marker' : '');
    el.dataset.date = ds;
    el.innerHTML = `<div class="cal-day-name">${d.toLocaleDateString('en-GB',{weekday:'short'})}</div><div class="cal-day-num">${d.getDate()}</div><div class="cal-day-month">${d.toLocaleDateString('en-GB',{month:'short'})}</div>`;
    el.onclick = () => handleCalClick(ds);
    container.appendChild(el);
  }
  refreshCal();
}

function handleCalClick(ds) {
  if (tripMode === 'oneday') {
    startInput.value = ds;
    endInput.value   = ds;
    refreshCal(); updateSummary();
    return;
  }
  const s = startInput.value, e = endInput.value;
  if (!s || (s && e)) { startInput.value = ds; endInput.value = ''; }
  else if (s && !e) {
    if (ds < s) { startInput.value = ds; }
    else { endInput.value = ds; }
  }
  refreshCal(); updateSummary();
}

function refreshCal() {
  const s = startInput.value, e = endInput.value;
  document.querySelectorAll('.cal-day').forEach(el => {
    const ds = el.dataset.date;
    el.classList.remove('selected','in-range','range-start','range-end');
    if (s && !e && ds === s) el.classList.add('selected');
    else if (s && e) {
      if (ds === s) el.classList.add('range-start');
      else if (ds === e) el.classList.add('range-end');
      else if (ds > s && ds < e) el.classList.add('in-range');
    }
  });
}

function updateSummary() {
  const s = startInput.value, e = endInput.value;
  const el = document.getElementById('trip-summary');
  if (tripMode === 'oneday' && s) {
    el.textContent = `⛳ One round · ${new Date(s+'T12:00:00').toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'short'})}`;
    el.classList.add('visible');
  } else if (s && e) {
    const days = Math.round((parseDate(e)-parseDate(s))/(86400000))+1;
    el.textContent = `⛳ ${days} day${days>1?'s':''} · ${new Date(s+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'})} – ${new Date(e+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'})}`;
    el.classList.add('visible');
  } else if (s) {
    el.textContent = `📅 Now select your end date`;
    el.classList.add('visible');
  } else { el.classList.remove('visible'); }
}

startInput.addEventListener('change', () => { refreshCal(); updateSummary(); });
endInput.addEventListener('change',   () => { refreshCal(); updateSummary(); });
buildCalStrip(); updateSummary();

// ── OPEN-METEO ──────────────────────────────────────────────────
async function geocode(city) {
  const res  = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=en&format=json`);
  const data = await res.json();
  if (!data.results?.length) throw new Error('City not found');
  return { lat: data.results[0].latitude, lon: data.results[0].longitude, name: data.results[0].name };
}

async function getWeather(lat, lon) {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}`
    + `&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,windspeed_10m_max,weathercode`
    + `&hourly=temperature_2m,apparent_temperature,precipitation_probability,windspeed_10m,weathercode`
    + `&timezone=auto&forecast_days=14`;
  return (await fetch(url)).json();
}

function wmoInfo(code) {
  if (code === 0)  return { desc: 'Clear sky',     icon: '☀️' };
  if (code <= 2)   return { desc: 'Partly cloudy', icon: '⛅' };
  if (code === 3)  return { desc: 'Overcast',      icon: '☁️' };
  if (code <= 49)  return { desc: 'Foggy',         icon: '🌫️' };
  if (code <= 55)  return { desc: 'Drizzle',       icon: '🌦️' };
  if (code <= 67)  return { desc: 'Rain',          icon: '🌧️' };
  if (code <= 77)  return { desc: 'Snow',          icon: '❄️' };
  if (code <= 82)  return { desc: 'Rain showers',  icon: '🌦️' };
  if (code >= 95)  return { desc: 'Thunderstorm',  icon: '⛈️' };
  return { desc: 'Mixed', icon: '🌥️' };
}

function processWeather(raw, startDate, endDate) {
  const { daily, hourly } = raw;
  return daily.time.map((date, i) => {
    if (date < startDate || date > endDate) return null;
    const w     = wmoInfo(daily.weathercode[i]);
    const hIdxs = hourly.time.map((t,hi) => t.startsWith(date) ? hi : -1).filter(x=>x>=0);
    const slot  = (fh, th) => {
      const idxs = hIdxs.filter(hi => { const h=parseInt(hourly.time[hi].split('T')[1]); return h>=fh&&h<th; });
      if (!idxs.length) return null;
      const mid = idxs[Math.floor(idxs.length/2)];
      return {
        temp:  idxs.reduce((a,hi)=>a+hourly.temperature_2m[hi],0)/idxs.length,
        feels: idxs.reduce((a,hi)=>a+hourly.apparent_temperature[hi],0)/idxs.length,
        rain:  Math.max(...idxs.map(hi=>hourly.precipitation_probability[hi])),
        wind:  idxs.reduce((a,hi)=>a+hourly.windspeed_10m[hi],0)/idxs.length,
        code:  hourly.weathercode[mid],
      };
    };
    return {
      date,
      maxTemp:    daily.temperature_2m_max[i],
      minTemp:    daily.temperature_2m_min[i],
      avgTemp:    (daily.temperature_2m_max[i]+daily.temperature_2m_min[i])/2,
      rainChance: daily.precipitation_probability_max[i],
      windSpeed:  daily.windspeed_10m_max[i],
      desc: w.desc, icon: w.icon,
      morning: slot(6,12), afternoon: slot(12,18), evening: slot(18,23),
    };
  }).filter(Boolean);
}

// ── RENDER ──────────────────────────────────────────────────────
function fmt(str)  { return new Date(str+'T12:00:00').toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'}); }
function fmts(str) { return new Date(str+'T12:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'}); }

function dayClass(d) {
  if (d.rainChance > 50) return 'rainy';
  if (d.avgTemp > 24)    return 'hot';
  if (d.avgTemp <= 12)   return 'cold';
  return '';
}

function renderSlot(label, time, slot) {
  if (!slot) return `<div class="slot"><div class="slot-label">${label}</div><div class="slot-time">${time}</div><div style="color:#ccc;font-size:0.8rem;margin-top:6px">–</div></div>`;
  const w = wmoInfo(slot.code);
  return `<div class="slot">
    <div class="slot-label">${label}</div>
    <div class="slot-time">${time}</div>
    <span class="slot-icon">${w.icon}</span>
    <div class="slot-temp">${slot.temp.toFixed(0)}°</div>
    <div class="slot-feels">Feels ${slot.feels.toFixed(0)}°</div>
    <div class="slot-meta">💧 ${slot.rain}% · 💨 ${slot.wind.toFixed(0)} km/h</div>
  </div>`;
}

function renderClothingRec(d, type) {
  const { items, tip } = getClothingForTemp(d.avgTemp, d.rainChance, d.windSpeed, type);
  const typeLabel = type === 'cold' ? '🥶 Cold-sensitive' : '🏌️ Average golfer';
  return `<div class="clothing-rec">
    <div class="clothing-rec-title">${typeLabel} · What to wear</div>
    <div class="clothing-items">
      ${items.map(i=>`<div class="clothing-item">${i}</div>`).join('')}
    </div>
    ${tip ? `<div class="clothing-tip">${tip}</div>` : ''}
  </div>`;
}

function renderDayCard(d, label, type) {
  return `<div class="day-card ${dayClass(d)}">
    <div class="day-top">
      <div>
        <div class="day-label">${label}</div>
        <div class="day-date">${fmt(d.date)}</div>
        <div class="day-desc">${d.icon} ${d.desc}</div>
      </div>
      <div class="day-temp-block">
        <div class="day-temp">${d.avgTemp.toFixed(0)}°C</div>
        <div class="day-range">${d.minTemp.toFixed(0)}° – ${d.maxTemp.toFixed(0)}°</div>
      </div>
    </div>
    <div class="day-meta">
      <div class="day-meta-item">💧 ${d.rainChance}% rain</div>
      <div class="day-meta-item">💨 ${d.windSpeed.toFixed(0)} km/h</div>
    </div>
    <div class="slots">
      ${renderSlot('Morning','06:00–12:00', d.morning)}
      ${renderSlot('Afternoon','12:00–18:00', d.afternoon)}
      ${renderSlot('Evening','18:00–22:00', d.evening)}
    </div>
    ${renderClothingRec(d, type)}
  </div>`;
}

function renderWeekCard(d, type) {
  const { items } = getClothingForTemp(d.avgTemp, d.rainChance, d.windSpeed, type);
  const topItems = items.slice(0, 3);
  return `<div class="week-card ${dayClass(d)}">
    <div class="wc-day">${fmts(d.date)}</div>
    <span class="wc-icon">${d.icon}</span>
    <div class="wc-temp">${d.avgTemp.toFixed(0)}°C</div>
    <div class="wc-range">${d.minTemp.toFixed(0)}° – ${d.maxTemp.toFixed(0)}°</div>
    <div class="wc-rain">💧 ${d.rainChance}%
      <div class="rain-bar"><div class="rain-fill" style="width:${Math.min(d.rainChance,100)}%"></div></div>
    </div>
    <div class="wc-wind">💨 ${d.windSpeed.toFixed(0)} km/h</div>
    <div class="wc-clothes">
      ${topItems.map(i=>`<div class="wc-clothes-item">${i}</div>`).join('')}
    </div>
  </div>`;
}

function renderPacklist(pack) {
  const cats = [
    { label:'👕 Clothing',   items: pack.clothing },
    { label:'👟 Footwear',   items: pack.footwear },
    { label:'🏌️ Equipment', items: pack.equipment },
    { label:'🧴 Essentials', items: pack.essentials },
  ];
  let itemId = 0;
  return `<div class="packlist-card">
    <div class="section-title">🎒 Your Full Pack List</div>
    ${cats.map(cat => {
      const ids = cat.items.map(() => `pi-${itemId++}`);
      return `
      <div class="pack-category">
        <div class="pack-cat-title">
          ${cat.label}
          <span class="pack-progress" id="prog-${cat.label.replace(/[^a-z]/gi,'')}"></span>
        </div>
        <div class="pack-items">
          ${cat.items.map((item, i) => `
            <div class="pack-item" id="${ids[i]}" onclick="tickItem('${ids[i]}', '${cat.label.replace(/[^a-z]/gi,'')}', ${cat.items.length})">
              <div class="pack-check">✓</div>
              <span class="pack-name">${item.name}</span>
              ${item.qty > 1 ? `<span class="pack-qty">×${item.qty}</span>` : ''}
            </div>`).join('')}
        </div>
      </div>`;
    }).join('')}
    <div class="pack-tip">💡 <strong>Golf trip tip:</strong> Always pack 1 warm layer, 1 windproof layer, and 1 extra polo — you'll be ready for almost any golf weather.</div>
  </div>`;
}

function tickItem(id, catKey, total) {
  const el = document.getElementById(id);
  el.classList.toggle('ticked');
  // update progress
  const catEl = document.getElementById(`prog-${catKey}`);
  if (catEl) {
    const allItems = el.closest('.pack-category').querySelectorAll('.pack-item');
    const ticked   = el.closest('.pack-category').querySelectorAll('.pack-item.ticked').length;
    catEl.textContent = ticked > 0 ? `${ticked}/${allItems.length} packed` : '';
  }
}

// ── MAIN ────────────────────────────────────────────────────────
async function checkTrip() {
  const city  = document.getElementById('location').value.trim();
  const start = document.getElementById('start-date').value;
  const end   = document.getElementById('end-date').value;

  if (!city)  { alert('Please enter a destination.'); return; }
  if (!start) { alert('Please select a date.'); return; }
  if (tripMode === 'trip' && !end)        { alert('Please select an end date.'); return; }
  if (tripMode === 'trip' && end < start) { alert('End date must be after start date.'); return; }

  const effectiveEnd = (tripMode === 'oneday') ? start : end;

  const btn = document.getElementById('main-btn');
  btn.disabled = true;
  btn.innerHTML = `<div class="spinner"></div><span>Loading your forecast…</span>`;

  const result = document.getElementById('result');
  result.innerHTML = `<div class="packlist-card"><div class="skeleton" style="width:50%;height:20px;margin-bottom:16px"></div><div class="skeleton"></div><div class="skeleton" style="width:80%"></div></div>`;

  try {
    const geo  = await geocode(city);
    const raw  = await getWeather(geo.lat, geo.lon);
    const days = processWeather(raw, start, effectiveEnd);

    if (!days.length) {
      result.innerHTML = `<div class="alert">⚠️ No forecast data for those dates. Please pick dates within the next 14 days.</div>`;
      btn.disabled = false; btn.innerHTML = `<span>Check my golf packer</span>`;
      return;
    }

    const type      = golferType;
    const firstDay  = days[0];
    const restDays  = days.slice(1);
    const pack      = generatePacklist(days, type);
    const tripLabel = days.length === 1 ? 'Your Round' : `Day 1 of ${days.length}`;

    result.innerHTML = `
      <div class="section-title">⛳ ${geo.name} · ${days.length} Day${days.length>1?'s':''}</div>

      ${renderDayCard(firstDay, tripLabel, type)}

      ${restDays.length === 1 ? renderDayCard(restDays[0], 'Day 2', type) : ''}

      ${restDays.length > 1 ? `
        <div class="section-title" style="margin-top:24px">📅 Rest of Your Trip</div>
        <div class="week-grid">${restDays.map(d=>renderWeekCard(d,type)).join('')}</div>` : ''}

      ${renderPacklist(pack)}`;

  } catch(err) {
    result.innerHTML = `<div class="alert">⚠️ Couldn't find "<strong>${city}</strong>". Try a nearby city (e.g. "Malaga" instead of "Marbella").</div>`;
  }

  btn.disabled = false;
  btn.innerHTML = `<span>Check my golf packer</span>`;
}
</script>
